[bar.default]
capsule = true
end = [
    "keyboard_layout",
    "tray",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "caffeine",
    "power_profile",
    "battery",
    "session"
]
font_weight = 600
margin_edge = 2.0
margin_ends = 0.0
padding = 0
scale = 1.5
shadow = false
start = [ "workspaces", "active_window" ]
widget_spacing = 12

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 5.0

    [idle.behavior.lock]
    action = "lock"
    enabled = false
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = false
    timeout = 660

[location]
auto_locate = true

[nightlight]
enabled = true

[shell]
clipboard_enabled = false
font_family = "Arimo Nerd Font Propo"
polkit_agent = true
telemetry_enabled = false

    [shell.animation]
    enabled = false

    [shell.shadow]
    blur = 0

[theme]
builtin = "Catppuccin"
source = "builtin"

[weather]
auto_locate = true

[widget.brightness]
scroll_step = 1

[widget.network]
show_label = false

[widget.volume]
scroll_step = 1
